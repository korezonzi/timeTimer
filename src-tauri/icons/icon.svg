<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="sector" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Background circle -->
  <circle cx="256" cy="272" r="180" fill="#1c1917" opacity="0.8"/>

  <!-- Timer sector (75% remaining — iconic pose) -->
  <path d="M 256 272 L 256 92 A 180 180 0 1 1 76 272 Z" fill="url(#sector)" opacity="0.85"/>

  <!-- Ring -->
  <circle cx="256" cy="272" r="180" fill="none" stroke="#ef4444" stroke-width="12" opacity="0.4"/>

  <!-- Center dot -->
  <circle cx="256" cy="272" r="8" fill="white" opacity="0.9"/>

  <!-- Top notch (12 o'clock marker) -->
  <rect x="250" y="100" width="12" height="24" rx="4" fill="white" opacity="0.8"/>

  <!-- "TT" text at top -->
  <text x="256" y="56" text-anchor="middle" dominant-baseline="middle"
        font-family="system-ui, -apple-system, Helvetica, sans-serif"
        font-size="42" font-weight="800" fill="white" letter-spacing="4" opacity="0.9">
    TT
  </text>
</svg>
